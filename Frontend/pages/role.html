<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Select Your Role</title>
  <link rel="stylesheet" href="/Frontend/css/style.css">
</head>
<body>
<div class="container">
    <div class="role-container">
  <h2>Select Your Role</h2>
  <div class="role-buttons">
    <button id="ownerBtn">I'm a Pet Owner</button>
    <button id="caregiverBtn">I'm a Caregiver</button>
  </div>
  <div id="code-container" style="display: none;">
    <h3>Your Group Code:</h3>
    <p id="groupCode"></p>
    <button onclick="copyCode()">Copy Code</button>
  </div>
</div>
<div class="img-container">
    <img src="/Frontend/assets/role.png" alt="pet-img" id="roleImg">
</div>
</div>
</body>
</html>
