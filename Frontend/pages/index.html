<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pet Care Login & Signup</title>
    <link rel="stylesheet" href="/Frontend/css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,200..800&family=Cookie&family=Gabriela&family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
</head>

<body>
    <div class="container">
        <div class="background">
        <img src="/Frontend/assets/bg.png">
        <h2 id="quote">Some bonds don't need words — just a bowl filled, a walk taken, a hand that returns.</h2>
    </div>
    <div class="form-div">
        <div class="form-container">
            <img src="/Frontend/assets/logo.png" alt="Pet Care Logo" class="logo">

            <div class="toggle-buttons">
                <button id="loginBtn" class="active">Login</button>
                <button id="signupBtn">Signup</button>
            </div>

            <!-- LOGIN FORM -->
            <form id="loginForm" class="form-content">
                <h2>Login</h2>
                <input type="text" id="loginEmail" placeholder="Username" required>
                <input type="password" id="loginPassword" placeholder="Password" required>
                <div class="link-group">
                    <a href="#" id="forgotPasswordLink">Forgot Password?</a>
                </div>
                <button type="submit" class="submit-btn">Login</button>
                <p>Not a member? <a href="#" onclick="showSignup()">Signup now</a></p>
            </form>

            <!-- SIGNUP FORM -->
            <form id="signupForm" class="form-content" style="display: none;">
                <h2>Signup</h2>
                <input type="text" id="signupUsername" placeholder="Username" required>
                <input type="email" id="signupEmail" placeholder="Email Address" required>
                <input type="password" id="signupPassword" placeholder="Password" required>
                <button type="submit" class="submit-btn">Signup</button>
                <p>Already a member? <a href="#" onclick="showLogin()">Login now</a></p>
            </form>

            <!-- FORGOT PASSWORD -->
            <form id="forgotPasswordSection" class="form-content" style="display: none;">
                <h2>Reset Password</h2>
                <input type="email" id="resetEmail" placeholder="Enter your email" required>
                <button type="button" id="sendResetLinkBtn" class="submit-btn">Send Reset Link</button>
                <div class="link-group">
                    <a href="#" id="backToLogin">Back to Login</a>
                </div>
            </form>
        </div>
    </div>
    </div>
    <script src="app.js"></script>
</body>

</html>
